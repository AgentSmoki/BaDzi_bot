repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - aiogram==3.17.0
          - pydantic==2.10.6
          - pydantic-settings==2.8.1
          - sqlalchemy[asyncio]==2.0.40
          - redis==5.2.1
          - structlog==25.3.0
          - types-pytz
          - types-pillow
        args: [--ignore-missing-imports]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: \.env\.example$

  - repo: local
    hooks:
      - id: graphify-update
        name: Update graphify code graph + report prose drift
        entry: python3 scripts/graphify_update.py --quiet
        language: system
        pass_filenames: false
        always_run: true
        # Code graph rebuilt deterministically (tree-sitter, ~seconds, free).
        # Prose drift is reported as warning only; never blocks commits.
        # To refresh prose graph: /graphify . --update from Claude Code.
