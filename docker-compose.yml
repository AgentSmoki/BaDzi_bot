services:
  bot:
    build: .
    command: python -m bot.main
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./assets:/app/assets:ro
      - kuzu_data:/app/knowledge/kuzu_db
    restart: unless-stopped

  web:
    build: .
    command: uvicorn web.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: python -m taskiq worker tasks.broker:broker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - kuzu_data:/app/knowledge/kuzu_db
    restart: unless-stopped

  # Wave 3c — APScheduler service for paid forecast delivery (daily 04:00,
  # monthly weekly/bulk). Standalone container so the bot stays polling-only
  # and forecast cron jobs survive its restarts via the SQLAlchemyJobStore.
  scheduler:
    build: .
    command: python -m bot.scheduler
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - kuzu_data:/app/knowledge/kuzu_db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: badzi
      POSTGRES_USER: badzi
      POSTGRES_PASSWORD: badzi_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U badzi -d badzi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
  kuzu_data:
