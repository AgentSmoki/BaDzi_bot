<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Fontconfig aliases for the BaZi bot Linux runtime.

  The chart template references macOS-native font family names so local
  development on macOS uses native CoreText rendering. Linux containers
  don't know what "PingFang SC", "Hiragino Sans GB", "Songti SC", or
  "Apple Color Emoji" mean — fontconfig's default response when it can't
  resolve a name is to fall through to the system default (DejaVu Sans),
  which has no CJK glyphs at all. The chart then renders tofu boxes (▯)
  for every Chinese character.

  This file routes those macOS names to the open-source replacements we
  bundle in the runtime image. Drop it into /etc/fonts/conf.d/ and
  fc-cache -fv picks it up.
-->
<fontconfig>
  <!-- macOS CJK sans-serif → Noto Sans CJK SC -->
  <alias>
    <family>PingFang SC</family>
    <prefer><family>Noto Sans CJK SC</family></prefer>
  </alias>
  <alias>
    <family>PingFang TC</family>
    <prefer><family>Noto Sans CJK TC</family></prefer>
  </alias>
  <alias>
    <family>Hiragino Sans GB</family>
    <prefer><family>Noto Sans CJK SC</family></prefer>
  </alias>
  <alias>
    <family>Hiragino Kaku Gothic ProN</family>
    <prefer><family>Noto Sans CJK JP</family></prefer>
  </alias>

  <!-- macOS CJK serif → Noto Serif CJK SC -->
  <alias>
    <family>Songti SC</family>
    <prefer><family>Noto Serif CJK SC</family></prefer>
  </alias>
  <alias>
    <family>Hiragino Mincho ProN</family>
    <prefer><family>Noto Serif CJK JP</family></prefer>
  </alias>

  <!-- macOS emoji → OpenMoji Color. Replaced Twemoji Mozilla in L-1
       fix (2026-05-16) because Twemoji's palette renders washed out
       on the У-син wheel (🌳🔥⛰⚙💧 looked dim). OpenMoji has more
       saturated colours, larger glyph metrics, and is COLR-format so
       Pango picks it up natively. Apache-2.0 licensed for clean
       commercial redistribution. -->
  <alias>
    <family>Apple Color Emoji</family>
    <prefer><family>OpenMoji Color</family></prefer>
  </alias>
  <alias>
    <family>Segoe UI Emoji</family>
    <prefer><family>OpenMoji Color</family></prefer>
  </alias>
  <!-- Catch-all: any time Pango asks for the generic "emoji" alias,
       prefer OpenMoji over Noto Color Emoji (which is the Debian
       default and renders even flatter). -->
  <alias>
    <family>emoji</family>
    <prefer>
      <family>OpenMoji Color</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
</fontconfig>
